<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>Forgot Password</title>


</head>

<body class="bg-gradient d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow custom-card">
<h3 class="text-center">Forgot Password</h3>

<form onsubmit="return validateEmail()">
<input type="email" id="email" class="form-control mb-3" placeholder="Enter Email">

<button class="btn btn-warning w-100" onclick="showLoader(this)">
<span class="btn-text">Send Link</span>
<span class="spinner-border spinner-border-sm d-none"></span>
</button>
</form>

</div>

<script src="script.js"></script>

</body>
</html>
