<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>Register</title>
</head>

<body class="bg-gradient d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow custom-card">
<h3 class="text-center">Register</h3>

<form onsubmit="return validateRegister()">

<input type="text" id="name" class="form-control mb-3" placeholder="Full Name">
<input type="email" id="email" class="form-control mb-3" placeholder="Email">
<input type="number" id="phone" class="form-control mb-3" placeholder="Phone">

<input type="password" id="password" class="form-control mb-2" placeholder="Password">
<div id="strengthText" class="small mb-2"></div>

<div class="input-group mb-3">
<input type="password" id="confirm" class="form-control" placeholder="Confirm Password">
<span class="input-group-text" onclick="togglePassword('confirm')">
<i class="bi bi-eye"></i>
</span>
</div>

<button class="btn btn-success w-100" onclick="showLoader(this)">
<span class="btn-text">Register</span>
<span class="spinner-border spinner-border-sm d-none"></span>
</button>

<div class="text-center mt-3">
<a href="login.html">Already have account?</a>
</div>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
