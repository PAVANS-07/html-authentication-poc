<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>Login</title>


</head>

<body class="bg-gradient d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 custom-card" style="width:350px;">
<h3 class="text-center mb-3">Welcome Back</h3>

<form onsubmit="return validateLogin()">

<input id="user" type="text" class="form-control mb-3" placeholder="Username">

<div class="input-group mb-3">
<input type="password" id="pass" class="form-control" placeholder="Password">
<span class="input-group-text" onclick="togglePassword('pass')">
<i class="bi bi-eye"></i>
</span>
</div>

<button class="btn btn-primary w-100" onclick="showLoader(this)">
<span class="btn-text">Login</span>
<span class="spinner-border spinner-border-sm d-none"></span>
</button>

<div class="text-center mt-3">
<a href="forgot.html">Forgot Password?</a><br>
<a href="registration.html">Create Account</a>
</div>

</form>
</div>

<script src="script.js"></script>

</body>
</html>
