<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<title>Reset Password</title>


</head>

<body class="bg-gradient d-flex align-items-center justify-content-center vh-100">

<div class="card p-4 shadow custom-card">
<h3 class="text-center">Reset Password</h3>

<div class="input-group mb-3">
<input type="password" id="newPass" class="form-control" placeholder="New Password">
<span class="input-group-text" onclick="togglePassword('newPass')">
<i class="bi bi-eye"></i>
</span>
</div>

<input type="password" id="confirmPass" class="form-control mb-3" placeholder="Confirm Password">

<button class="btn btn-danger w-100" onclick="showLoader(this)">
<span class="btn-text">Update</span>
<span class="spinner-border spinner-border-sm d-none"></span>
</button>

</div>

<script>

</script>

</body>
</html>
